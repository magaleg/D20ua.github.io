<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Project | Under Construction</title>
    <style>
        :root {
            --gold: #c5a059;
            --dark-red: #5e0000;
            --parchment: #f4e4bc;
        }

        body {
            background-color: #1a1a1a;
            color: #2c1810;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .scroll {
            background-color: var(--parchment);
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 50px rgba(139, 69, 19, 0.2);
            max-width: 500px;
            text-align: center;
            border: 2px solid var(--gold);
            position: relative;
        }

        h1 {
            color: var(--dark-red);
            font-variant: small-caps;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
        }

        p {
            line-height: 1.6;
            font-size: 1.1em;
        }

        .dice-container {
            margin-top: 20px;
        }

        button {
            background-color: var(--dark-red);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1em;
            border-radius: 3px;
            transition: transform 0.2s;
        }

        button:hover {
            background-color: #800000;
            transform: scale(1.05);
        }

        #result {
            font-weight: bold;
            font-size: 1.5em;
            color: var(--dark-red);
            margin-top: 10px;
            height: 30px;
        }

        footer {
            margin-top: 30px;
            font-size: 0.8em;
            color: #6d4c41;
        }
    </style>
</head>
<body>

    <div class="scroll">
        <h1>Пригода починається...</h1>
        <p>Дєдушка Наварро розминає свої куби</p>
        
        <div class="dice-container">
            <button onclick="rollDice()">Кинути d20 на тєпло дєда</button>
            <div id="result"></div>
        </div>

        <footer>
            Ми в процесі, скоро буде сайт!
        </footer>
    </div>

    <script>
        function rollDice() {
            const resultElement = document.getElementById('result');
            const roll = Math.floor(Math.random() * 20) + 1;
            
            let message = roll;
            if (roll === 20) message = "20! Критичний успіх!";
            if (roll === 1) message = "1... Критичний провал!";
            
            resultElement.innerText = message;
            resultElement.style.transform = "scale(1.2)";
            setTimeout(() => resultElement.style.transform = "scale(1)", 200);
        }
    </script>
</body>
</html>
