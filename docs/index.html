<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Довідник | Класи</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            padding-top: 20px;
            
        }

        .title-container {
            text-align: center;
            margin-top: 5%;
            margin-bottom: 20px;
        }

        .carousel-container {
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }


        .category-card-display {
            order: 2; 
            width: 100%;
            max-width: 600px;
            min-height: 400px;
            background-image: url('assets/img/mainboxbg.png');
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            text-decoration: none;
            color: #a195f7;
            padding: 20px;
            text-align: center;
            transition: 0.5s;
        }

        .category-image {
            max-width: 80%;
            max-height: 250px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .category-title {
            font-size: 2.2em;
            margin: 5px 0;
            color: #cfa55d;
            font-variant: small-caps;
        }

        .category-description {
            font-size: 1em;
            color: #cfa55d;
            font-style: italic;
        }

        .arrow {
            width: 0;
            height: 0;
            cursor: pointer;
            transition: 0.3s;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        .arrow-left {
            order: 1; /* Зліва */
            border-top: 40px solid transparent;
            border-bottom: 40px solid transparent;
            border-right: 50px solid #cfa55d;
        }

        .arrow-right {
            order: 3; /* Справа */
            border-top: 40px solid transparent;
            border-bottom: 40px solid transparent;
            border-left: 50px solid #cfa55d;
        }


        @media (max-width: 650px) {
            .carousel-container {
                flex-wrap: wrap; 
                justify-content: center;
                gap: 15px;
            }

            .category-card-display {
                order: 1; 
                width: 95%;
                min-height: 350px;
            }

            .arrow {
                order: 2; 
                margin-top: 10px;
            }

            .arrow-left {
                border-top: 20px solid transparent;
                border-bottom: 20px solid transparent;
                border-right: 30px solid #d1d5b3;
                margin-right: 15px;
            }

            .arrow-right {
                border-top: 20px solid transparent;
                border-bottom: 20px solid transparent;
                border-left: 30px solid #d1d5b3;
                margin-left: 15px;
            }
        }

        .fade { animation: fadeIn 0.5s; }
        @keyframes fadeIn {
            from { opacity: 0.2; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
 <div class ="title-container">
    <h1>ОБЕРИ СВОЮ ДОЛЮ</h1>
 </div>
    <div class="carousel-container">
        <div class="arrow arrow-left" onclick="prevSlide()"></div>

        <a href="#" id="category-link" class="category-card-display fade">
            <img src="" id="category-img" class="category-image" alt="Class Image">
            <h2 id="category-name" class="category-title"></h2>
            <p id="category-desc" class="category-description"></p>
        </a>

        <div class="arrow arrow-right" onclick="nextSlide()"></div>
    </div>

    <script>
        const categories = [
            { name: "Бард", desc: "Харизматичний чарівник-артист, загроза для драконів.", img: "assets/img/bard.png", url: "wiki/classes/bard.html" },
            { name: "Воїн", desc: "У тебе був безмежний вибір, але ти обрав людину-воїна.", img: "assets/img/fighter.png", url: "wiki/classes/fighter.html" },
            { name: "Варвар", desc: "Дикий воїн, що впадає в лють. Rawr.", img: "assets/img/barbarian.png", url: "wiki/classes/barbarian.html" },
            { name: "Друїд", desc: "Захисник природи, що перетворюється на звірів.", img: "assets/img/druid.png", url: "wiki/classes/druid.html" },
            { name: "Жрець", desc: "Служитель божества, що отримує сили від бога.", img: "assets/img/cleric.png", url: "wiki/classes/cleric.html" },
            { name: "Монах", desc: "Майстер бойових мистецтв, мільйон бонусних атак за хід.", img: "assets/img/monk.png", url: "wiki/classes/monk.html" },
            { name: "Паладин", desc: "Святий воїн, що дає священну клятву.", img: "assets/img/paladin.png", url: "wiki/classes/paladin.html" },
            { name: "Слідопит", desc: "Мисливець та провідник дикої місцевості.", img: "assets/img/ranger.png", url: "wiki/classes/ranger.html" },
            { name: "Пройдисвіт", desc: "Майстер скритності, хитрощів та ударів у спину.", img: "assets/img/rogue.png", url: "wiki/classes/rogue.html" },
            { name: "Чаклун", desc: "Той, хто уклав угоду з могутньою сутністю.", img: "assets/img/warlock.png", url: "wiki/classes/warlock.html" },
            { name: "Чарівник", desc: "Маг-задрот, що бачить магію як науку.", img: "assets/img/wizard.png", url: "wiki/classes/wizard.html" },
            { name: "Чародій", desc: "Отримує сили від народження. Чітер.", img: "assets/img/sorcerer.png", url: "wiki/classes/sorcerer.html"}
        ];

        let currentIndex = 0;

        function updateCarousel() {
            const card = document.getElementById('category-link');
            const name = document.getElementById('category-name');
            const desc = document.getElementById('category-desc');
            const img = document.getElementById('category-img');
            
            card.classList.remove('fade');
            void card.offsetWidth;
            card.classList.add('fade');

            const cat = categories[currentIndex];
            name.innerText = cat.name;
            desc.innerText = cat.desc;
            img.src = cat.img;
            card.href = cat.url;
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % categories.length;
            updateCarousel();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + categories.length) % categories.length;
            updateCarousel();
        }

        updateCarousel();

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") nextSlide();
            if (e.key === "ArrowLeft") prevSlide();
        });
    </script>
</body>
</html>
