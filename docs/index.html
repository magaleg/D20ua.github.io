<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Довідник | Класи</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .carousel-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            gap: 10px;
            padding: 20px;
            box-sizing: border-box;
        }

        .category-card-display {
            width: 100%;
            max-width: 600px;
            min-height: 450px;
            background-color: rgb(74, 93, 69, 0.9); /* Трохи прозорості для фону */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            text-decoration: none;
            color: white;
            transition: 0.5s ease-in-out;
            padding: 20px;
            text-align: center;
        }

        .category-image {
            width: auto;
            height: auto;
            max-width: 80%;
            max-height: 250px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        .category-title {
            font-size: clamp(1.8em, 5vw, 2.5em); /* Адаптивний розмір шрифту */
            font-variant: small-caps;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin: 10px 0;
            color: #f4e4bc;
        }

        .category-description {
            font-size: 1.1em;
            color: #d1d5b3;
            max-width: 90%;
            font-style: italic;
            margin: 0;
        }

        .arrow {
            width: 0;
            height: 0;
            cursor: pointer;
            transition: 0.3s;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            flex-shrink: 0;
        }

        .arrow-left {
            border-top: 30px solid transparent;
            border-bottom: 30px solid transparent;
            border-right: 40px solid #d1d5b3;
        }

        .arrow-right {
            border-top: 30px solid transparent;
            border-bottom: 30px solid transparent;
            border-left: 40px solid #d1d5b3;
        }

        /* Адаптація для мобільних пристроїв */
        @media (max-width: 600px) {
            .carousel-container {
                flex-direction: column; /* Елементи стають в стовпчик */
                gap: 30px;
            }

            .category-card-display {
                min-height: 400px;
                order: 1; /* Картка зверху */
            }

            .controls {
                display: flex;
                gap: 50px;
                order: 2; /* Стрілки знизу для зручності великого пальця */
            }

            .arrow-left {
                border-top: 25px solid transparent;
                border-bottom: 25px solid transparent;
                border-right: 35px solid #d1d5b3;
            }

            .arrow-right {
                border-top: 25px solid transparent;
                border-bottom: 25px solid transparent;
                border-left: 35px solid #d1d5b3;
            }
        }

        .fade {
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="carousel-container">
        <div class="arrow arrow-left" onclick="prevSlide()"></div>

        <a href="#" id="category-link" class="category-card-display fade">
            <img src="" id="category-img" class="category-image" alt="Class Image">
            <h2 id="category-name" class="category-title"></h2>
            <p id="category-desc" class="category-description"></p>
        </a>

        <div class="arrow arrow-right" onclick="nextSlide()"></div>
    </div>

    <script>
        const categories = [
            { name: "Бард", desc: "Чарівник-артист, майстер на всі руки.", img: "assets/img/bard.png", url: "wiki/classes/bard.html" },
            { name: "Боєць", desc: "Майстер зброї та тактики.", img: "assets/img/fighter.png", url: "wiki/classes/fighter.html" },
            { name: "Варвар", desc: "Лютий воїн, що впадає в лють.", img: "assets/img/barbarian.png", url: "wiki/classes/barbarian.html" },
            { name: "Друїд", desc: "Захисник природи, що перетворюється на звірів.", img: "assets/img/druid.png", url: "wiki/classes/druid.html" },
            { name: "Жрець", desc: "Служитель божества, що використовує божественну магію.", img: "assets/img/cleric.png", url: "wiki/classes/cleric.html" },
            { name: "Монах", desc: "Майстер бойових мистецтв.", img: "assets/img/monk.png", url: "wiki/classes/monk.html" },
            { name: "Паладин", desc: "Святий воїн, що дає священну клятву.", img: "assets/img/paladin.png", url: "wiki/classes/paladin.html" },
            { name: "Слідопит", desc: "Мисливець та провідник дикої місцевості.", img: "assets/img/ranger.png", url: "wiki/classes/ranger.html" },
            { name: "Спритник", desc: "Майстер скритності, хитрощів та ударів у спину.", img: "assets/img/rogue.png", url: "wiki/classes/rogue.html" },
            { name: "Чаклун", desc: "Той, хто уклав угоду з могутньою сутністю.", img: "assets/img/warlock.png", url: "wiki/classes/warlock.html" },
            { name: "Чарівник", desc: "Вчений магії, що вивчає заклинання.", img: "assets/img/wizard.png", url: "wiki/classes/wizard.html" },
            { name: "Чародій", desc: "Володар вродженої магії.", img: "assets/img/sorcerer.png", url: "wiki/classes/sorcerer.html" }
        ];

        let currentIndex = 0;

        function updateCarousel() {
            const card = document.getElementById('category-link');
            const name = document.getElementById('category-name');
            const desc = document.getElementById('category-desc');
            const img = document.getElementById('category-img');
            
            card.classList.remove('fade');
            void card.offsetWidth;
            card.classList.add('fade');

            const cat = categories[currentIndex];
            name.innerText = cat.name;
            desc.innerText = cat.desc;
            img.src = cat.img;
            card.href = cat.url;
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % categories.length;
            updateCarousel();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + categories.length) % categories.length;
            updateCarousel();
        }

        updateCarousel();

        // Керування клавіатурою
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") nextSlide();
            if (e.key === "ArrowLeft") prevSlide();
        });
    </script>
</body>
</html>
