<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Довідник | Класи</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
        }

        /* Контейнер каруселі */
        .carousel-container {
            display: flex;
            flex-direction: row; /* На десктопі все в рядок */
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Картка класу */
        .category-card-display {
            order: 2; /* На десктопі вона посередині */
            width: 100%;
            max-width: 600px;
            min-height: 400px;
            background-color: #4a5d45;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            text-decoration: none;
            color: white;
            padding: 20px;
            text-align: center;
            transition: 0.5s;
        }

        .category-image {
            max-width: 80%;
            max-height: 250px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .category-title {
            font-size: 2.2em;
            margin: 5px 0;
            color: #f4e4bc;
            font-variant: small-caps;
        }

        .category-description {
            font-size: 1em;
            color: #d1d5b3;
            font-style: italic;
        }

        /* Стрілки (Десктоп) */
        .arrow {
            width: 0;
            height: 0;
            cursor: pointer;
            transition: 0.3s;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        .arrow-left {
            order: 1; /* Зліва */
            border-top: 40px solid transparent;
            border-bottom: 40px solid transparent;
            border-right: 50px solid #d1d5b3;
        }

        .arrow-right {
            order: 3; /* Справа */
            border-top: 40px solid transparent;
            border-bottom: 40px solid transparent;
            border-left: 50px solid #d1d5b3;
        }

        /* --- АДАПТАЦІЯ ДЛЯ МОБІЛОК --- */
        @media (max-width: 650px) {
            .carousel-container {
                flex-wrap: wrap; /* Дозволяємо елементам переходити на новий рядок */
                justify-content: center;
                gap: 15px;
            }

            .category-card-display {
                order: 1; /* Картка стає першою (зверху) */
                width: 95%;
                min-height: 350px;
            }

            /* Контейнер для стрілок, щоб вони були поруч */
            .arrow {
                order: 2; /* Стрілки йдуть після картки */
                margin-top: 10px;
            }

            /* Робимо стрілки маленькими */
            .arrow-left {
                border-top: 20px solid transparent;
                border-bottom: 20px solid transparent;
                border-right: 30px solid #d1d5b3;
                margin-right: 15px; /* Відстань між стрілками */
            }

            .arrow-right {
                border-top: 20px solid transparent;
                border-bottom: 20px solid transparent;
                border-left: 30px solid #d1d5b3;
                margin-left: 15px;
            }
        }

        .fade { animation: fadeIn 0.5s; }
        @keyframes fadeIn {
            from { opacity: 0.2; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<div class="carousel-container">
    <div class="arrow arrow-left" onclick="prevSlide()"></div>

    <a href="#" id="category-link" class="category-card-display fade">
        <img src="" id="category-img" class="category-image" alt="Class Image">
        <h2 id="category-name" class="category-title"></h2>
        <p id="category-desc" class="category-description"></p>
    </a>

    <div class="arrow arrow-right" onclick="nextSlide()"></div>
</div>

<style>
    /* Базові стилі для десктопа */
    .carousel-container {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 30px;
        min-height: 100vh;
    }

    .arrow {
        width: 0;
        height: 0;
        cursor: pointer;
        transition: 0.3s;
    }

    .arrow-left {
        border-top: 40px solid transparent;
        border-bottom: 40px solid transparent;
        border-right: 50px solid #d1d5b3;
    }

    .arrow-right {
        border-top: 40px solid transparent;
        border-bottom: 40px solid transparent;
        border-left: 50px solid #d1d5b3;
    }

    /* --- АДАПТАЦІЯ ТІЛЬКИ ДЛЯ МОБІЛОК (до 650px) --- */
    @media (max-width: 650px) {
        .carousel-container {
            flex-direction: column; /* Картка зверху, все інше знизу */
            gap: 15px;
        }

        .category-card-display {
            width: 95%;
            min-height: 380px;
            /* Картка автоматично стане першою в колонці */
        }

        /* Стилі для стрілок, щоб вони стали поруч внизу */
        .arrow {
            /* Стрілки залишаються елементами флекс-контейнера, 
               але ми можемо їх згрупувати візуально */
            display: inline-block;
            margin: 10px 15px; /* Близьке розташування */
        }

        /* Контейнер каруселі сам вирівняє їх у ряд, якщо ми додамо цей хак: */
        .carousel-container {
            display: grid;
            grid-template-areas: 
                "card card"
                "prev next";
            justify-items: center;
        }

        .category-card-display { grid-area: card; }
        .arrow-left { 
            grid-area: prev; 
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            border-right: 35px solid #d1d5b3;
            justify-self: end; /* Притискаємо вліво до центру */
        }
        .arrow-right { 
            grid-area: next; 
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            border-left: 35px solid #d1d5b3;
            justify-self: start; /* Притискаємо вправо до центру */
        }
    }
</style>
</html>
